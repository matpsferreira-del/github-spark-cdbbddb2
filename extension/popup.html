<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Orion LinkedIn Saver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: hsl(215, 28%, 10%);
      color: hsl(210, 40%, 98%);
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 4px;
      color: hsl(187, 71%, 45%);
    }
    .subtitle { font-size: 11px; color: hsl(215, 15%, 60%); margin-bottom: 16px; }
    label { display: block; font-size: 12px; margin-bottom: 4px; color: hsl(215, 15%, 60%); }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid hsl(215, 20%, 25%);
      border-radius: 6px;
      background: hsl(215, 25%, 14%);
      color: hsl(210, 40%, 98%);
      font-size: 13px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: hsl(187, 71%, 45%); }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: hsl(187, 71%, 45%);
      color: hsl(215, 28%, 10%);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { font-size: 12px; margin-top: 12px; text-align: center; }
    .status.success { color: hsl(142, 71%, 45%); }
    .status.error { color: hsl(0, 62%, 50%); }
    .logged-in { text-align: center; }
    .logged-in p { font-size: 12px; color: hsl(215, 15%, 60%); margin-bottom: 8px; }
    .logged-in .email { color: hsl(187, 71%, 45%); font-weight: 600; font-size: 13px; }
    .btn-secondary {
      background: hsl(215, 20%, 20%);
      color: hsl(210, 40%, 98%);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>🚀 Orion LinkedIn Saver</h1>
  <p class="subtitle">Salve perfis do LinkedIn no seu plano</p>

  <div id="login-form">
    <label>Email</label>
    <input type="email" id="email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="password" placeholder="••••••••">
    <button id="login-btn">Entrar</button>
    <div id="login-status" class="status"></div>
  </div>

  <div id="logged-in-view" style="display:none">
    <div class="logged-in">
      <p>Logado como</p>
      <p class="email" id="user-email"></p>
      <p style="margin-top:12px;color:hsl(142,71%,45%);font-size:12px">
        ✅ Navegue até um perfil do LinkedIn e clique no botão "Salvar no Orion" na página.
      </p>
      <button class="btn-secondary" id="logout-btn">Sair</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
